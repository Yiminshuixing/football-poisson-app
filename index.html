<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d6efd">
  <meta name="description" content="基于泊松分布的足球比赛预测工具，13联赛支持">
  <title>⚽ 足彩泊松分析</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <hgroup>
        <h1>⚽ 足彩泊松分析</h1>
        <p>基于 Poisson 分布 + Kelly 公式</p>
      </hgroup>
    </header>

    <!-- 步骤 1：选择联赛 -->
    <section id="step1" aria-label="选择联赛">
      <h3>① 选择联赛</h3>
      <div id="leagueGrid" class="grid"></div>
    </section>

    <!-- 步骤 2：选择赛季 (已隐藏，自动选最新) -->
    <section id="step2" hidden>
      <h3>② 选择赛季</h3>
      <div id="seasonButtons" class="grid"></div>
      <button class="secondary" id="backToLeague">← 返回选联赛</button>
    </section>

    <!-- 步骤 3：选择球队 -->
    <section id="step3" hidden>
      <h3>③ 选择主客队 <small id="currentSeasonLabel" style="color:var(--pico-muted-color);font-weight:normal"></small></h3>
    <section id="step3" hidden>
      <h3>③ 选择主客队</h3>
      <div id="loadingTeams" aria-busy="true" hidden>加载球队列表...</div>
      <div class="grid">
        <div>
          <label>主队
            <select id="homeTeam" required>
              <option value="">-- 请选择主队 --</option>
            </select>
          </label>
        </div>
        <div>
          <label>客队
            <select id="awayTeam" required>
              <option value="">-- 请选择客队 --</option>
            </select>
          </label>
        </div>
      </div>
      <div class="grid">
        <button class="secondary" id="backToSeason">← 返回选赛季</button>
        <button id="analyzeBtn" disabled>下一步：赔率 →</button>
      </div>
    </section>

    <!-- 步骤 4：赔率 -->
    <section id="step4" hidden>
      <h3>④ 赔率输入方式</h3>
      <div class="grid">
        <button id="oddsAuto">① 自动拉取赔率</button>
        <button class="secondary" id="oddsManual">② 手动输入赔率</button>
        <button class="contrast" id="oddsSkip">0 跳过（纯模型分析）</button>
      </div>
    </section>

    <section id="manualOdds" hidden>
      <h4>手动输入赔率（欧赔）</h4>
      <div class="grid">
        <label>主胜
          <input type="number" id="oddsHome" step="0.01" min="1.01" placeholder="例如 1.85">
        </label>
        <label>平局
          <input type="number" id="oddsDraw" step="0.01" min="1.01" placeholder="例如 3.40">
        </label>
        <label>客胜
          <input type="number" id="oddsAway" step="0.01" min="1.01" placeholder="例如 4.20">
        </label>
      </div>
      <button id="submitManualOdds">开始分析 →</button>
    </section>

    <!-- 步骤 5：分析结果 -->
    <section id="result" hidden>
      <h3>📊 分析结果</h3>
      <div id="resultContent"></div>
      <button class="secondary" id="newAnalysis">← 新分析</button>
    </section>

    <footer>
      <small>
        数据源: <a href="https://github.com/Yiminshuixing/football.json" target="_blank" rel="noopener">GitHub fork of openfootball</a> ·
        赔率: <a href="https://the-odds-api.com" target="_blank" rel="noopener">The Odds API</a> ·
        仅供研究娱乐，理性购彩
      </small>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
